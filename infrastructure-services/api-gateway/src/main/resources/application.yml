server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: identity-service-route
              uri: lb://identity-service
              predicates:
                - Path=/identity-service/**
              filters:
                - StripPrefix=1
            - id: amenities-service-route
              uri: lb://amenities-service
              predicates:
                - Path=/amenities-service/**
              filters:
                - StripPrefix=1
                - name: CircuitBreaker
                  args:
                    id: amenitiesServiceCircuitBreaker
                    fallbackUri: forward:/fallback/amenities-service

            - id: room-service-route
              uri: lb://room-service
              predicates:
                - Path=/room-service/**
              filters:
                - StripPrefix=1
                - name: CircuitBreaker
                  args:
                    id: roomServiceCircuitBreaker
                    fallbackUri: forward:/fallback/room-service

            - id: booking-service-route
              uri: lb://booking-service
              predicates:
                - Path=/booking-service/**
              filters:
                - StripPrefix=1
                - name: CircuitBreaker
                  args:
                    id: bookingServiceCircuitBreaker
                    fallbackUri: forward:/fallback/booking-service

            - id: billing-service-route
              uri: lb://billing-service
              predicates:
                - Path=/billing-service/**
              filters:
                - StripPrefix=1
                - name: CircuitBreaker
                  args:
                    id: billingServiceCircuitBreaker
                    fallbackUri: forward:/fallback/billing-service

            - id: housekeeping-service-route
              uri: lb://housekeeping-service
              predicates:
                - Path=/housekeeping-service/**
              filters:
                - StripPrefix=1
                - name: CircuitBreaker
                  args:
                    id: housekeepingServiceCircuitBreaker
                    fallbackUri: forward:/fallback/housekeeping-service
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
management:
  endpoints:
    web:
      exposure:
        include: health

  endpoint:
    health:
      show-details: always

  health:
    defaults:
      enabled: true

logging:
  level:
    org.springframework.cloud.gateway: TRACE
    org.springframework.web.servlet: DEBUG
    org.springframework.web.client: DEBUG

jwt:
  secret: ${JWT_SECRET:3c983a532b4084d5a864bc1fcd89045b4c102047385a86cfef4e659b85c1817c}

resilience4j:
  circuitbreaker:
    configs:
      default:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10000
    instances:
      bookingServiceCircuitBreaker:
        baseConfig: default
      roomServiceCircuitBreaker:
        baseConfig: default
      amenitiesServiceCircuitBreaker:
        baseConfig: default
      housekeepingServiceCircuitBreaker:
        baseConfig: default
      billingServiceCircuitBreaker:
        baseConfig: default
