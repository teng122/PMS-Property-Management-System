version: '3.8'

services:
  # =========================================================================
  # 1. CỤM DATABASE (GIỮ NGUYÊN - CHỈ THÊM NETWORKS)
  # =========================================================================
  postgres-s1-identity:
    image: postgres:15-alpine
    container_name: postgres-identity
    restart: unless-stopped
    ports:
      - "5431:5432"
    environment:
      POSTGRES_USER: user_identity
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: hotel_identity_db
    volumes:
      - identity-db:/var/lib/postgresql/data
    networks:
      - hotel-network

  postgres-s2-booking:
    image: postgres:15-alpine
    container_name: postgres-booking
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: user_booking
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: hotel_booking_db
    networks:
      - hotel-network

  postgres-s3-amenities:
    image: postgres:15-alpine
    container_name: postgres-amenities
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: user_amenities
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: hotel_amenities_db
    volumes:
      - amenities-db:/var/lib/postgresql/data
    networks:
      - hotel-network

  postgres-s4-housekeeping:
    image: postgres:15-alpine
    container_name: postgres-housekeeping
    restart: unless-stopped
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: user_housekeeping
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: hotel_housekeeping_db
    volumes:
      - housekeeping-db:/var/lib/postgresql/data
    networks:
      - hotel-network

  postgres-s5-billing:
    image: postgres:15-alpine
    container_name: postgres-billing
    restart: unless-stopped
    ports:
      - "5435:5432"
    environment:
      POSTGRES_USER: user_billing
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: hotel_billing_db
    volumes:
      - billing-db:/var/lib/postgresql/data
    networks:
      - hotel-network

  postgres-s6-room:
    image: postgres:15-alpine
    container_name: postgres-room
    restart: unless-stopped
    ports:
      - "5436:5432"
    environment:
      POSTGRES_USER: user_room
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: hotel_room_db
    volumes:
      - room-db:/var/lib/postgresql/data
    networks:
      - hotel-network

  redis-cache:
    image: redis:7-alpine
    container_name: hotel-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

    command: redis-server --appendonly yes

    networks:
      - hotel-network

  kafka:
    image: apache/kafka:latest
    container_name: hotel-kafka
    restart: unless-stopped
    ports:
      - "9092:29092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,EXTERNAL://:29092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    healthcheck:
      test: [ "CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1" ]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 30s
    networks:
      - hotel-network

  # =========================================================================
  # 2. CỤM HẠ TẦNG JAVA (THÊM MỚI VÀO PHÍA DƯỚI)
  # =========================================================================
  config-server:
    build:
      context: ./infrastructure-services/config-server

    container_name: hotel-config-server

    restart: unless-stopped

    ports:
      - "8888:8888"

    environment:
      SPRING_PROFILES_ACTIVE: native

    healthcheck:
      test: [ "CMD","wget","-q","--spider","http://localhost:8888/actuator/health" ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

    networks:
      - hotel-network

  eureka-server:
    build:
      context: ./infrastructure-services/eureka-server

    container_name: hotel-eureka-server

    restart: unless-stopped

    ports:
      - "8761:8761"

    environment:
      SPRING_CLOUD_CONFIG_URI: http://config-server:8888

    depends_on:
      config-server:
        condition: service_healthy

    healthcheck:
      test: [ "CMD","wget","-q","--spider","http://localhost:8761/actuator/health" ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

    networks:
      - hotel-network

  api-gateway:
    build:
      context: ./infrastructure-services/api-gateway

    container_name: hotel-api-gateway

    restart: unless-stopped

    ports:
      - "8080:8080"

    environment:
      SPRING_CLOUD_CONFIG_URI: http://config-server:8888
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      JWT_SECRET: 3c983a532b4084d5a864bc1fcd89045b4c102047385a86cfef4e659b85c1817c

    depends_on:
      config-server:
        condition: service_healthy

      eureka-server:
        condition: service_healthy

    healthcheck:
      test: [ "CMD","wget","-q","--spider","http://localhost:8080/actuator/health" ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

    networks:
      - hotel-network

  identity-service:
    build:
      context: ./business-services/identity-service
    container_name: hotel-identity-service
    restart: unless-stopped
    ports:
      - "8086:8086"
    environment:
      SPRING_CLOUD_CONFIG_URI: http://config-server:8888
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-identity:5432/hotel_identity_db
      JWT_SECRET: 3c983a532b4084d5a864bc1fcd89045b4c102047385a86cfef4e659b85c1817c
    depends_on:
      postgres-s1-identity:
        condition: service_started
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    networks:
      - hotel-network

  room-service:
    build:
      context: ./business-services/room-service
    container_name: hotel-room-service
    restart: unless-stopped
    ports:
      # Host 8081 bị một JVM do Jenkins spawn chiếm; map ra 8091 để tránh xung đột.
      # Gateway vẫn gọi room-service qua Eureka + mạng nội bộ Docker (container:8081).
      - "8091:8081"
    environment:
      SPRING_CLOUD_CONFIG_URI: http://config-server:8888
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-room:5432/hotel_room_db
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      postgres-s6-room:
        condition: service_started
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - hotel-network

  booking-service:
    build:
      context: ./business-services/booking-service
    container_name: hotel-booking-service
    restart: unless-stopped
    ports:
      - "8082:8082"
    environment:
      SPRING_CLOUD_CONFIG_URI: http://config-server:8888
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-booking:5432/hotel_booking_db
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      postgres-s2-booking:
        condition: service_started
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - hotel-network

  amenities-service:
    build:
      context: ./business-services/amenities-service
    container_name: hotel-amenities-service
    restart: unless-stopped
    ports:
      - "8083:8083"
    environment:
      SPRING_CLOUD_CONFIG_URI: http://config-server:8888
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-amenities:5432/hotel_amenities_db
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      postgres-s3-amenities:
        condition: service_started
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - hotel-network

  housekeeping-service:
    build:
      context: ./business-services/housekeeping-service
    container_name: hotel-housekeeping-service
    restart: unless-stopped
    ports:
      - "8084:8084"
    environment:
      SPRING_CLOUD_CONFIG_URI: http://config-server:8888
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-housekeeping:5432/hotel_housekeeping_db
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      postgres-s4-housekeeping:
        condition: service_started
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - hotel-network

  billing-service:
    build:
      context: ./business-services/billing-service
    container_name: hotel-billing-service
    restart: unless-stopped
    ports:
      - "8085:8085"
    environment:
      SPRING_CLOUD_CONFIG_URI: http://config-server:8888
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-billing:5432/hotel_billing_db
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      postgres-s5-billing:
        condition: service_started
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - hotel-network

# Khai báo mạng ảo dùng chung để các container nhìn thấy nhau
networks:
  hotel-network:
    driver: bridge

volumes:
  identity-db:
  booking-db:
  amenities-db:
  housekeeping-db:
  billing-db:
  room-db:
  redis-data:
