server:
  port: 8081

spring:
  application:
    name: room-service
  
  datasource:
    url: jdbc:postgresql://localhost:5431/hotel_identity_db
    username: user_identity
    password: password123
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

eureka:
  client:
    enabled: false
    service-url:
      defaultZone: http://localhost:8761/eureka/