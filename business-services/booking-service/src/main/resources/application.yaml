server:
  port: 8082

spring:
  application:
    name: booking-service

  # check docker-compose.yml đúng service đang làm.
  datasource:
    url: jdbc:postgresql://localhost:5432/hotel_booking_db
    username: user_booking
    password: password123
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

# Cấu hình Eureka Client kết nối về cụm hạ tầng
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true